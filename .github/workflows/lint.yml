name: Lint

"on":
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.8.0"
          args: "check"
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.8.0"
          args: "format --check"
